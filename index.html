
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniGig | The Student Economy</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">UNI<span>GIG</span></div>
            <nav>
                <button class="btn btn-ghost" onclick="toggleAuth()">Sign In</button>
            </nav>
        </header>

        <section class="hero">
            <h1>The marketplace for <br> Moratuwa Students.</h1>
            <p>Exchange skills, find tech help, or pick up a weekend gig. Built by students, for students.</p>
            <div class="hero-btns">
                <a href="#auth" class="btn btn-primary">Get Started</a>
                <a href="#" class="btn btn-ghost" style="margin-left: 10px;">Browse Gigs</a>
            </div>
        </section>

        <div id="auth" class="auth-container">
            <h2 style="margin-bottom: 1.5rem; font-size: 1.2rem;">Create your account</h2>
            <form id="auth-form">
                <input type="email" id="email" placeholder="UoM Email (@uom.lk)" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Continue</button>
            </form>
            <p style="font-size: 0.8rem; color: var(--text-dim); margin-top: 1rem; text-align: center;">
                By continuing, you agree to the UniGig Terms of Service.
            </p>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
