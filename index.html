<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniGig | Student Marketplace</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

    <header>
        <div class="container" style="display: flex; width: 100%; justify-content: space-between; align-items: center;">
            <div class="logo">UNI<span>GIG</span></div>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-outline" onclick="openModal('login')">Log in</button>
                <button class="btn btn-primary" onclick="openModal('signup')">Sign up</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="badge animate-up">Version 1.0 • UoM Exclusive</div>
            <h1 class="animate-up delay-1">The campus <br><span>freelance network.</span></h1>
            <p class="subtitle animate-up delay-2">Monetize your skills, outsource your minor tasks, and build your portfolio within the university community.</p>
            
            <div class="animate-up delay-3" style="display: flex; gap: 16px;">
                <button class="btn btn-primary" onclick="openModal('signup')">Start exploring</button>
                <a href="https://github.com" target="_blank" class="btn btn-outline">View documentation</a>
            </div>
        </section>
    </main>

    <!-- Authentication Modal Overlay -->
    <div class="modal-overlay" id="authModal" onclick="closeModal(event)">
        <div class="auth-card" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()" aria-label="Close">&times;</button>
            <div class="tab-group">
                <button class="tab active" id="tab-login" onclick="switchTab('login')">Log in</button>
                <button class="tab" id="tab-signup" onclick="switchTab('signup')">Sign up</button>
            </div>

            <!-- The data-mode attribute is key here! -->
            <form id="authForm" data-mode="login">
                
                <div class="form-group signup-only">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Display name for your profile">
                </div>

                <div class="form-group">
                    <label>UoM Email Address</label>
                    <input type="email" id="email" placeholder="name@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-group signup-only">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-accent" id="submitBtn" style="width: 100%;">
                    Log in to UniGig
                </button>
            </form>
        </div>
    </div>

    <!-- UI Logic for the Modal -->
    <script>
        const modal = document.getElementById('authModal');
        const loginTab = document.getElementById('tab-login');
        const signupTab = document.getElementById('tab-signup');
        const submitBtn = document.getElementById('submitBtn');
        const authForm = document.getElementById('authForm');

        function openModal(mode) {
            modal.classList.add('active');
            switchTab(mode);
        }

        function closeModal(event) {
            if (!event || event.target === modal) {
                modal.classList.remove('active');
            }
        }

        function switchTab(mode) {
            const fullNameInput = document.getElementById('fullName');
            const confirmPwdInput = document.getElementById('confirmPassword');

            if (mode === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                submitBtn.textContent = 'Log in to UniGig';
                
                // Remove required attributes so the user can log in
                fullNameInput.removeAttribute('required');
                confirmPwdInput.removeAttribute('required');
            } else {
                loginTab.classList.remove('active');
                signupTab.classList.add('active');
                submitBtn.textContent = 'Create account';
                
                // Add required attributes for sign up
                fullNameInput.setAttribute('required', 'true');
                confirmPwdInput.setAttribute('required', 'true');
            }
            
            authForm.setAttribute('data-mode', mode);
        }
    </script>
    
    <!-- Firebase Logic (ES6 Module) -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
