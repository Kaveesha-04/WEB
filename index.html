<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniGig | Student Marketplace</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

    <header>
        <div class="container" style="display: flex; width: 100%; justify-content: space-between; align-items: center;">
            <div class="logo">UNI<span>GIG</span></div>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-outline" onclick="openModal('login')">Log in</button>
                <button class="btn btn-primary" onclick="openModal('signup')">Sign up</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="badge animate-up">Version 1.0</div>
            <h1 class="animate-up delay-1">The campus <br><span>freelance network.</span></h1>
            <p class="subtitle animate-up delay-2">Monetize your skills, outsource your minor tasks, and build your portfolio within the university community.</p>
            
            <div class="animate-up delay-3" style="display: flex; gap: 16px;">
                <button class="btn btn-primary" onclick="openModal('signup')">Start exploring</button>
                <a href="https://github.com/Kaveesha-04/WEB" target="_blank" class="btn btn-outline">View documentation</a>
            </div>
        </section>
    </main>

    <!-- Authentication Modal Overlay -->
    <div class="modal-overlay" id="authModal" onclick="closeModal(event)">
        <div class="auth-card" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()" aria-label="Close">&times;</button>
            <div class="tab-group">
                <button class="tab active" id="tab-login" onclick="switchTab('login')">Log in</button>
                <button class="tab" id="tab-signup" onclick="switchTab('signup')">Sign up</button>
            </div>

            <div class="social-group" id="socialGroup">
                <button class="btn btn-social" id="googleBtn" disabled>
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                    Continue with Google
                </button>
                <button class="btn btn-social" id="appleBtn" disabled>
                    <img src="https://www.svgrepo.com/show/511330/apple-173.svg" alt="Apple" style="filter: invert(1);">
                    Continue with Apple
                </button>
            </div>

            <div class="divider" id="socialDivider">or continue with email</div>

            <!-- The data-mode attribute is key here! -->
            <form id="authForm" data-mode="login">
                
                <div class="form-group signup-only">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Display name for your profile">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="margin-bottom: 0;">Password</label>
                        <a href="#" id="forgotPasswordBtn" class="login-only forgot-link">Forgot?</a>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" data-target="password">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <div class="form-group signup-only">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="••••••••">
                        <button type="button" class="toggle-password" data-target="confirmPassword">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-accent" id="submitBtn" style="width: 100%;">
                    Log in to UniGig
                </button>
            </form>
        </div>
    </div>

    <!-- UI Logic for the Modal -->
    <script>
        const modal = document.getElementById('authModal');
        const loginTab = document.getElementById('tab-login');
        const signupTab = document.getElementById('tab-signup');
        const submitBtn = document.getElementById('submitBtn');
        const authForm = document.getElementById('authForm');

        function openModal(mode) {
            modal.classList.add('active');
            switchTab(mode);
        }

        function closeModal(event) {
            if (!event || event.target === modal) {
                modal.classList.remove('active');
            }
        }

        function switchTab(mode) {
            const fullNameInput = document.getElementById('fullName');
            const confirmPwdInput = document.getElementById('confirmPassword');
            
            // Grab the new social elements
            const socialGroup = document.getElementById('socialGroup');
            const socialDivider = document.getElementById('socialDivider');

            if (mode === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                submitBtn.textContent = 'Log in to UniGig';
                
                fullNameInput.removeAttribute('required');
                confirmPwdInput.removeAttribute('required');
                
                // SHOW the social buttons
                socialGroup.style.display = 'flex';
                socialDivider.style.display = 'flex';
            } else {
                loginTab.classList.remove('active');
                signupTab.classList.add('active');
                submitBtn.textContent = 'Create account';
                
                fullNameInput.setAttribute('required', 'true');
                confirmPwdInput.setAttribute('required', 'true');
                
                // HIDE the social buttons to keep the card clean
                socialGroup.style.display = 'none';
                socialDivider.style.display = 'none';
            }
            
            authForm.setAttribute('data-mode', mode);
        }
    </script>
    
    <!-- Firebase Logic (ES6 Module) -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
