<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | UniGig</title>
    <link rel="stylesheet" href="css/global.css">
    <style>

    </style>
</head>

<body>

    <header class="main-nav">
        <div class="container nav-container">
            <div class="logo">UNI<span>GIG</span></div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Back to Feed</a>
                <button class="btn btn-outline" id="logoutBtn">Log Out</button>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 40px; padding-bottom: 80px;">
        <div class="workspace-grid">

            <aside class="workspace-sidebar">
                <div class="auth-card"
                    style="transform: none; padding: 32px 24px; text-align: center; margin-bottom: 24px; max-height: none; overflow: visible;">
                    <div class="avatar-standard" id="profileAvatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <h2 id="profileName" style="font-size: 1.5rem; margin-bottom: 4px;">Loading...</h2>
                    <p id="profileMajor" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 16px;">
                        Student</p>

                    <button class="btn btn-outline" id="editProfileBtn" style="width: 100%; margin-bottom: 24px;">Edit
                        Profile</button>

                    <div class="sidebar-stats">
                        <div class="stat-row">
                            <span>From</span>
                            <span style="font-weight: 500; color: var(--text-primary);">UoM</span>
                        </div>
                        <div class="stat-row">
                            <span>Platform Status</span>
                            <span style="font-weight: 500; color: var(--text-primary);">Active</span>
                        </div>
                    </div>
                </div>

                <div class="auth-card" style="transform: none; padding: 24px; max-height: none; overflow: visible;">
                    <div class="sidebar-section">
                        <h3>Description</h3>
                        <p id="profileBio" style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6;">
                            This user hasn't written a bio yet.
                        </p>
                    </div>

                    <div class="divider"></div>

                    <div class="sidebar-section">
                        <h3>Skills</h3>
                        <div class="skills-container" id="skillsContainer">
                            <span style="color: var(--text-muted); font-size: 0.8rem;">No skills added yet.</span>
                        </div>
                    </div>
                </div>
            </aside>

            <section class="workspace-main">
                <div class="showcase-header">
                    <h2>Active Gigs</h2>
                    <button class="btn btn-accent btn-sm" id="postNewGigBtn">+ Create a New Gig</button>
                </div>

                <div id="myGigsGrid" class="gig-grid">
                    <div class="auth-card new-gig-placeholder" style="transform: none; max-height: none;">
                        <div class="placeholder-content">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5" style="margin-bottom: 12px; color: var(--text-muted);">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="12" y1="8" x2="12" y2="16"></line>
                                <line x1="8" y1="12" x2="16" y2="12"></line>
                            </svg>
                            <p>Post your first gig to start selling your skills.</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div class="modal-overlay" id="editProfileModal">
        <div class="auth-card" onclick="event.stopPropagation()" style="max-width: 500px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2>Edit Profile</h2>
                <button class="close-btn" id="closeEditModalBtn" style="position: static;">&times;</button>
            </div>

            <div class="form-group">
                <label>Degree / Major</label>
                <input type="text" id="majorInput" placeholder="e.g. B.Sc. Information Technology">
            </div>

            <div class="form-group">
                <label>Professional Bio</label>
                <textarea id="bioInput" placeholder="Tell the campus about your expertise..."
                    style="width: 100%; height: 100px; padding: 12px 16px; background: var(--bg-base); border: 1px solid var(--border-subtle); color: white; border-radius: var(--radius-sm); margin-bottom: 20px; outline: none; font-family: inherit; resize: vertical;"></textarea>
            </div>

            <div class="form-group">
                <label>Skills (Comma separated)</label>
                <input type="text" id="skillsInput" placeholder="e.g. Web Development, Python, UI Design">
            </div>

            <button class="btn btn-accent" id="saveProfileBtn" style="width: 100%; margin-top: 8px;">Save
                Changes</button>
        </div>
    </div>

    <script type="module" src="js/guard.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>

</html>
