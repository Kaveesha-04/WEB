<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace | UniGig</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body style="background: var(--bg-base);">

    <header class="main-nav">
        <div class="container nav-container">
            <div class="logo">UNI<span>GIG</span></div>
            <div class="nav-links">
                <button class="btn btn-accent" id="postGigBtn">Post a Task</button>
                <a href="profile.html" class="btn btn-outline" id="profileBtn">Profile</a>
                <button class="btn btn-danger" id="logoutBtn">Log Out</button>
            </div>
        </div>
    </header>

    <main class="container workspace-grid">

        <aside>
            <div class="card" style="text-align: center;">
                <div class="avatar">
                    <span id="userInitial">U</span>
                </div>
                <h3 id="userDisplayName" style="margin-bottom: 4px; font-size: 1.125rem;">Loading...</h3>
                <p id="userEmailDisplay" style="font-size: 0.85rem; margin-bottom: 24px;">...</p>
                
                <div style="border-top: 1px solid var(--border-subtle); padding-top: 16px; display: flex; justify-content: space-between;">
                    <span style="font-size: 0.85rem; font-weight: 500; color: var(--text-primary);">Active Tasks</span>
                    <span style="font-size: 0.85rem; font-weight: 600; color: var(--accent);">0</span>
                </div>
            </div>
        </aside>

        <section>
            <div class="card-header" style="margin-bottom: 24px;">
                <h2 style="font-size: 1.5rem;">Recent Opportunities</h2>
            </div>

            <div id="gigFeed" class="gig-grid">
                <div class="card" style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 40px;">
                    <p>Loading the marketplace data...</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Post a Task Modal -->
    <div class="modal-overlay" id="postGigModal">
        <div class="auth-card" style="max-width: 500px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="font-size: 1.5rem;">Post a Task</h2>
                <button class="close-btn" id="closePostModalBtn">✕</button>
            </div>
            
            <form id="postGigForm">
                <div class="form-group">
                    <label>Task Title</label>
                    <input type="text" id="gigTitle" placeholder="I will build a full-stack website..." required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="gigCategory" required style="width: 100%; height: 44px; padding: 0 16px; background: #ffffff; border: 1px solid var(--border-focus); border-radius: var(--radius-sm); font-size: 0.95rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 20px;">
                        <option value="" disabled selected>Select a category</option>
                        <option value="Website Dev">Website Dev</option>
                        <option value="Data Analytics">Data Analytics</option>
                        <option value="Tutoring">Tutoring</option>
                        <option value="UI/UX Design">UI/UX Design</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="gigDescription" placeholder="Describe the service you are offering..." rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label>Price (LKR)</label>
                    <input type="number" id="gigPrice" placeholder="e.g. 5000" min="0" required>
                </div>

                <button type="submit" class="btn btn-accent" id="submitGigBtn" style="width: 100%; margin-top: 8px;">Publish Gig</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/board.js"></script>
</body>
</html>
