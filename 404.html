<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | UniGig</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .error-icon {
            width: 64px;
            height: 64px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 1.5rem;
            font-weight: 800;
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-center p-6 bg-base">
    <div class="max-w-sm w-full mx-auto">
        <div class="error-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </div>
        <h1 class="text-xl font-bold mb-3">Page Not Found</h1>
        <p class="text-base text-muted mb-8">The page you're looking for doesn't exist or has been moved from the campus network.</p>
        <a href="index.html" class="btn btn-primary w-full">Return to Home</a>
    </div>
</body>
</html>
